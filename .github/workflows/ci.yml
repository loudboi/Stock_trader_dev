name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  alpaca-bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: alpaca-bot
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-ibkr.txt -r requirements-dev.txt
      - name: Run test suite
        run: pytest -q

  gex-lab:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gex-lab
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run test suite
        run: pytest -q
